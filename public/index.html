<!DOCTYPE html>
<html>
<head>
    <title>Node.js Real-time Chat</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .chat-message { margin: 5px 0; }
        .system-message { color: gray; font-style: italic; }
        #input-container { display: flex; gap: 10px; }
        #messageInput { flex: 1; padding: 10px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h2>Node.js Real-time Chat (WebSocket PoC)</h2>
    <div id="messages"></div>
    <div id="input-container">
        <input type="text" id="messageInput" placeholder="Ketik pesan...">
        <button onclick="sendMessage()">Kirim</button>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:3000');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');

        ws.onopen = () => {
            addMessage('System', 'Terhubung ke server!', 'system');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'chat') {
                addMessage('User', data.message, 'chat');
            } else if (data.type === 'system') {
                addMessage('System', data.message, 'system');
            }
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
            addMessage('Error', 'Koneksi bermasalah', 'system');
        };

        ws.onclose = () => {
            addMessage('System', 'Koneksi terputus', 'system');
        };

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = type === 'system' ? 'system-message' : 'chat-message';
            div.textContent = type === 'chat' ? `👤 ${text}` : `ℹ️ ${text}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && ws.readyState === WebSocket.OPEN) {
                ws.send(text);
                messageInput.value = '';
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
